<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Nexus Gaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --bg-dark: #050505;
            --card-bg: rgba(31, 40, 51, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            color: #e5e5e5;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .info-item i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .info-item span { font-size: 1.1rem; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        /* Form Sederhana (Hanya Tampilan) */
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
        }

        .btn-send {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: var(--primary);
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HUBUNGI KAMI</h1>
        <p style="text-align: center;">Ada pertanyaan atau tawaran kerjasama? Kami siap mendengarkan.</p>

        <div class="contact-info">
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>sulistiowati.lm@gmail.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Tangerang, Indonesia</span>
            </div>
        </div>

        <form action="#">
            <input type="text" placeholder="Nama Anda" required>
            <input type="email" placeholder="Email Anda" required>
            <textarea rows="5" placeholder="Pesan Anda..."></textarea>
            <button type="submit" class="btn-send">KIRIM PESAN</button>
        </form>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
    </div>

</body>
</html>
